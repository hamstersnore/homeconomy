<div class="flex flex-col p-40 space-y-4 h-dvh">
    <h1 class="text-6xl font-bold text-cyan-800">Transactions</h1>
    <a [routerLink]="['/create-transaction']" class="bg-cyan-800 py-3 px-4 text-white font-bold rounded-lg self-end text-center">Create new transaction</a>
@if (transactions().length != 0) {
    <table class="table-auto text-center">
        <thead class="border border-gray-200 bg-gray-50">
            <tr>
                <th class="px-4 py-3">Id</th>
                <th class="px-4 py-3">Amount</th>
                <th class="px-4 py-3">Execution date</th>
            </tr>
        </thead>
        <tbody class="bg-white">
            @for (tr of transactions(); track $index) {
            <tr>
                <th class="px-4 py-3 border-2 border-gray-200">{{tr.id}}</th>
                <td class="px-4 py-3 border-2 border-gray-200">{{tr.amount}} €</td>
                <td class="px-4 py-3 border-2 border-gray-200">{{tr.execution_date | date:'dd/MM/yyyy'}}</td>
            </tr>
            }
        </tbody>
    </table>
}
@else {
    <p class="text-gray-500">No transactions found</p>
}
</div>
