<div class="flex flex-col w-full h-dvh justify-center items-center">
<div class="flex flex-col p-8 w-1/3 space-y-4 rounded-lg">
    <h1 class="text-cyan-800 text-6xl font-bold">Save a new transaction</h1>
    <form class="flex flex-col space-y-4" (submit)="onSubmit($event)">
        <div class="flex flex-col space-y-1">
            <label>Amount</label>
            <input class="border rounded-lg px-4 py-2 bg-white" type="number" placeholder="0.00" step="0.01" [formField]="createTransactionForm.amount"/>
        </div>
        <div class="flex flex-col space-y-1">
            <label>Execution Date</label>
            <input class="border rounded-lg px-4 py-2" type="date" [formField]="createTransactionForm.execution_date"/>
        </div>
        <button class="mt-4 border rounded-lg bg-cyan-800 text-white py-3 font-bold" type="submit" value="Save">Save</button>
    </form>
</div>
</div>
