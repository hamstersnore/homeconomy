<div class="flex flex-row h-dvh p-8">
    <div class="flex flex-col justify-center p-8 w-2/5">
        <h1 class="text-cyan-800 text-6xl font-bold text-center">Sign up</h1>
        <form class="flex flex-col p-8 space-y-4 justify-center" (submit)="onSubmit($event)">
            <div class="flex flex-col space-y-1">
                <label class="font-bold">Username @if(signUpForm.username().invalid()) {<span class="text-orange-600">*</span>}</label>
                <input class="rounded-lg border w-full px-4 py-3" type="text" placeholder="Enter your username" [formField]="signUpForm.username"/>
            </div>
            <div class="flex flex-col space-y-1">
                <label class="font-bold">Password @if(signUpForm.password().invalid()) {<span class="text-orange-600">*</span>}</label>
                <input class="rounded-lg border w-full px-4 py-3" type="password" placeholder="Enter your password" [formField]="signUpForm.password"/>
            </div>
            <div class="flex flex-col space-y-1">
                <label class="font-bold">Repeat password @if(signUpForm.repassword().invalid()) {<span class="text-orange-600">*</span>}</label>
                <input class="rounded-lg border w-full px-4 py-3" type="password" placeholder="Repeat your password" [formField]="signUpForm.repassword"/>
            </div>
            <input class="mt-4 py-3 rounded-lg bg-cyan-800 text-white font-bold" title="Submit" type="submit" value="Enviar" />
            <p class="mt-4">Do you already have an account ? <a class="text-cyan-700 cursor-pointer font-semibold">Sign in here</a></p>
        </form>
    </div>
    <div class="w-full bg-cyan-800 p-10 flex flex-col justify-center items-center rounded-2xl">
        <h1 class="text-9xl text-white font-extrabold block w-fit">homeconomy</h1>
    </div>
</div>
