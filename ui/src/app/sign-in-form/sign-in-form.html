<div class="h-dvh p-16 flex flex-row justify-center items-center">
  <div class="bg-white border border-cyan-600 rounded-xl p-20 flex flex-col w-1/3 h-fit space-y-8">
    <h1 class="text-6xl text-cyan-800 text-center">Sign in</h1>
    <form class="space-y-6">
      <div class="flex flex-col space-y-3">
        <label>Username</label>
        <input
          class="px-4 py-3 border border-gray-500 rounded-xl"
          type="text"
          placeholder="Enter your username"
        />
      </div>
      <div class="flex flex-col space-y-3">
        <label>Password</label>
        <input
            class="px-4 py-3 border border-gray-500 rounded-xl" 
            type="password"
            placeholder="Enter your password" />
      </div>
      <button 
      class="bg-cyan-700 w-full px-4 py-3 rounded-xl text-white font-bold mt-4" 
      type="submit">Enter</button>
    </form>
    <p>If you don't have an account <span class="font-bold text-cyan-800">Sign up here</span></p>
  </div>
</div>
