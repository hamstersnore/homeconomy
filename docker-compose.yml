services:
  homeconomy-api:
    depends_on:
      - db
    build: 
      context: ./api
    container_name: homeconomy-api
    hostname: homeconomy-api
    networks:
      - homeconomy-net
    ports:
      - 8282:8086
    env_file:
      - .env

  db:
    image: postgres:18.4
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 3356:5432
    networks:
      - homeconomy-net
    volumes:
      - postgres-db:/var/lib/postgres
      - ./db/init-scripts:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    restart: always
    ports:
      - 8181:8080
    depends_on:
      - db
    networks:
      - homeconomy-net

  ui:
    depends_on:
      - homeconomy-api
    build:
      context: ./ui
    ports:
      - 8080:8080
    networks:
      - homeconomy-net

networks:
  homeconomy-net:
    driver: bridge

volumes:
  postgres-db: